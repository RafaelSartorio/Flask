<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Jogos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-between">

    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800">🎮 TrophyHunter</h1>
        <div class="flex items-center gap-4">
            <span class="text-sm font-medium text-gray-600">Olá, <strong class="text-blue-600">{{ nome }}</strong></span>
            <a href="/telaLogin" class="text-xs bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded transition font-semibold">Sair</a>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl w-full mx-auto p-6 space-y-6">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <form method="get" action="/dashboard" class="flex gap-3">
                <input type="text" name="pesquisa" value="{{ termo_pesquisado }}" placeholder="Digite o nome de um jogo... (Ex: Witcher)" 
                       class="flex-grow rounded-lg border border-gray-300 p-3 bg-gray-50 text-gray-800 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition outline-none">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition">
                    Buscar
                </button>
            </form>
        </div>

        <div class="space-y-4">
            <h2 class="text-xl font-bold text-gray-800">Sua Biblioteca de Troféus</h2>
            
            {% if not jogos %}
                <p class="text-gray-500 bg-white p-6 rounded-xl text-center border">Nenhum jogo encontrado para a sua busca.</p>
            {% else %}
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                    {% for jogo in jogos %}
                        <a href="/jogo/{{ jogo.id }}" class="group bg-white p-3 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition flex flex-col justify-between">
                            <img src="{{ jogo.capa }}" alt="Capa de {{ jogo.nome }}" 
                                 class="w-full h-56 object-cover rounded-lg shadow-sm group-hover:scale-[1.03] transition duration-200">
                            <h3 class="mt-3 text-sm font-bold text-gray-700 group-hover:text-blue-600 transition truncate">
                                {{ jogo.nome }}
                            </h3>
                        </a>
                    {% endfor %}
                </div>
            {% endif %}
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-gray-400">
        &copy; 2026 Meu Projeto Flask. Todos os direitos reservados.
    </footer>

</body>
</html>
