<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Usuário</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col justify-between">

    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800">Sistema Flask</h1>
        <div class="flex items-center gap-4">
            <span class="text-sm font-medium text-gray-600">Olá, <strong class="text-blue-600">{{ nome }}</strong></span>
            <a href="/telaLogin" class="text-xs bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded transition font-semibold">Sair</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-gray-100">
            <div class="text-center mb-6">
                <div class="bg-blue-100 text-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto text-2xl font-bold uppercase">
                    {{ nome[0] }}
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mt-3">Bem-vindo de volta!</h2>
                <p class="text-sm text-gray-500">Seu login foi validado com sucesso.</p>
            </div>

            <div class="bg-gray-50 p-4 rounded-lg space-y-3 border border-gray-200">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Nome do Usuário</label>
                    <p class="text-base font-medium text-gray-800">{{ nome }}</p>
                </div>
                <div class="border-t border-gray-200 pt-2">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">CPF Registrado</label>
                    <p class="text-base font-mono text-gray-800">{{ cpf }}</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-gray-400">
        &copy; 2026 Meu Projeto Flask. Todos os direitos reservados.
    </footer>

</body>
</html>
