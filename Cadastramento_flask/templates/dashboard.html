<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Vault - Painel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b051a] text-white min-h-screen" style="background-image: radial-gradient(circle at top left, rgba(99, 59, 188, 0.15), transparent 45%);">

    <nav class="bg-[#130b2b]/80 border-b border-purple-500/20 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <h1 class="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-300">
            🎮 GAME VAULT
        </h1>
        <div class="flex items-center gap-4">
            <span class="text-xs text-purple-300 bg-purple-500/10 border border-purple-500/30 px-3 py-1.5 rounded-full">
                👤 {{ nome }}
            </span>
            <a href="{{ url_for('fazer_logout') }}" class="text-xs text-red-400 hover:text-red-300 font-bold transition">Sair</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10 space-y-8">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-purple-500/10 pb-6">
            <div>
                <h2 class="text-2xl font-bold tracking-tight">Painel de Jogos</h2>
            </div>
            
            <form action="{{ url_for('tela_dashboard') }}" method="get" class="w-full md:w-80">
                <input type="text" name="pesquisa" value="{{ termo_pesquisado }}" placeholder="Buscar jogo..." 
                       class="w-full bg-[#130b2b]/60 border border-purple-500/30 rounded-lg p-2.5 px-4 text-xs text-white placeholder-purple-300/30 focus:outline-none focus:border-[#633bbc] transition">
            </form>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            {% for jogo in jogos %}
                <a href="/jogo/{{ jogo.id }}" class="group block bg-[#130b2b]/40 border border-purple-500/10 rounded-xl overflow-hidden shadow-lg hover:border-purple-500/40 transition-all transform hover:-translate-y-1">
                    
                    <div class="aspect-[3/4] bg-[#080314] overflow-hidden relative">
                        {% if jogo.capa %}
                            <img src="{{ jogo.capa }}" alt="{{ jogo.nome }}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                        {% else %}
                            <div class="w-full h-full flex items-center justify-center text-purple-500 text-3xl">🎮</div>
                        {% endif %}
                        <div class="absolute inset-0 bg-gradient-to-t from-[#0b051a] via-transparent to-transparent opacity-75"></div>
                    </div>

                    <div class="p-4 bg-[#130b2b]/60 backdrop-blur-sm">
                        <h3 class="font-bold text-sm truncate group-hover:text-purple-300 transition-colors">{{ jogo.nome }}</h3>
                    </div>

                </a>
            {% else %}
                <div class="col-span-full text-center py-12 bg-[#130b2b]/20 border border-dashed border-purple-500/20 rounded-2xl">
                    <p class="text-sm text-purple-300/50">Nenhum jogo encontrado.</p>
                </div>
            {% endfor %}
        </div>

    </main>

</body>
</html>
