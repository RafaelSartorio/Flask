<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Vault - Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b051a] min-h-screen flex items-center justify-center p-4" style="background-image: radial-gradient(circle at top right, rgba(99, 59, 188, 0.2), transparent 60%);">

    <div class="w-full max-w-md bg-[#130b2b]/60 border border-purple-500/20 rounded-2xl p-8 backdrop-blur-md shadow-2xl shadow-purple-950/50">
        
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-300 tracking-wider">
                📝 CRIAR CONTA
            </h1>
        </div>

        <form action="{{ url_for('SalvarUser') }}" method="post" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-purple-300 uppercase tracking-wider mb-1">Nome</label>
                <input type="text" name="nome" placeholder="Seu nome" required
                       class="w-full bg-[#080314]/80 border border-purple-500/30 rounded-lg p-3 text-white placeholder-purple-300/30 focus:outline-none focus:border-[#633bbc] focus:ring-1 focus:ring-[#633bbc] transition">
            </div>

            <div>
                <label class="block text-xs font-semibold text-purple-300 uppercase tracking-wider mb-1">CPF</label>
                <input type="text" name="cpf" placeholder="000.000.000-00" required
                       class="w-full bg-[#080314]/80 border border-purple-500/30 rounded-lg p-3 text-white placeholder-purple-300/30 focus:outline-none focus:border-[#633bbc] focus:ring-1 focus:ring-[#633bbc] transition">
            </div>

            <div>
                <label class="block text-xs font-semibold text-purple-300 uppercase tracking-wider mb-1">Senha</label>
                <input type="password" name="password" placeholder="••••••••" required
                       class="w-full bg-[#080314]/80 border border-purple-500/30 rounded-lg p-3 text-white placeholder-purple-300/30 focus:outline-none focus:border-[#633bbc] focus:ring-1 focus:ring-[#633bbc] transition">
            </div>

            <button type="submit" 
                    class="w-full bg-[#633bbc] hover:bg-[#5230a3] text-white font-bold p-3 rounded-lg transition-all shadow-lg shadow-purple-900/40 mt-2">
                Cadastrar
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-xs text-purple-300/50">
                Já tem conta? 
                <a href="{{ url_for('TelaLogin') }}" class="text-purple-400 hover:text-purple-300 font-semibold underline transition">Faça Login</a>
            </p>
        </div>

    </div>

</body>
</html>
