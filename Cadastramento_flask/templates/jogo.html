<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Vault - {{ jogo.nome }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b051a] text-white min-h-screen" style="background-image: radial-gradient(circle at top right, rgba(99, 59, 188, 0.12), transparent 40%);">

    <nav class="bg-[#130b2b]/80 border-b border-purple-500/20 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
        <a href="{{ url_for('tela_dashboard') }}" class="text-xs font-bold text-purple-400 hover:text-purple-300 transition">
            ⬅ Voltar para o Painel
        </a>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-10 space-y-10">

        <div class="flex flex-col md:flex-row gap-8 bg-[#130b2b]/50 border border-purple-500/20 p-6 rounded-2xl backdrop-blur-md items-center md:items-start">
            <div class="w-44 shrink-0 aspect-[3/4] rounded-xl overflow-hidden shadow-xl border border-purple-500/20">
                <img src="{{ jogo.capa }}" class="w-full h-full object-cover">
            </div>
            <div class="space-y-3 text-center md:text-left">
                <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white to-purple-200">
                    {{ jogo.nome }}
                </h2>
                <p class="text-sm text-purple-200/70 leading-relaxed">
                    {{ jogo.sinopse }}
                </p>
            </div>
        </div>

        <div class="space-y-4">
            <h3 class="text-lg font-bold border-b border-purple-500/10 pb-2">
                🏆 Conquistas do Jogo
            </h3>

            <div class="space-y-3">
                {% for trofeu in trofeus %}
                    <div class="bg-[#130b2b]/40 border border-purple-500/10 p-5 rounded-xl flex items-center justify-between gap-4">
                        
                        <div class="space-y-1">
                            <div class="flex items-center gap-2">
                                <span class="text-lg {% if trofeu.id in obtidos %}text-yellow-400 drop-shadow-[0_0_4px_rgba(234,179,8,0.3)]{% else %}text-purple-400/30{% endif %}">🏆</span>
                                <h4 class="font-bold text-sm {% if trofeu.id in obtidos %}text-purple-200{% else %}text-gray-400{% endif %}">
                                    {{ trofeu.nome }}
                                </h4>
                            </div>
                            <p class="text-xs text-purple-300/50 pl-7">{{ trofeu.descricao }}</p>
                            
                            <details class="group pl-7 pt-1 cursor-pointer outline-none">
                                <summary class="text-[11px] font-semibold text-purple-400 list-none flex items-center gap-1">
                                    ▶ Dica de Desbloqueio
                                </summary>
                                <div class="mt-2 text-xs text-purple-200 bg-[#0c051a] p-3 rounded-lg border border-purple-500/20">
                                    {{ trofeu.dica }}
                                </div>
                            </details>
                        </div>

                        <div>
                          <form action="/conquistar/{{ jogo.id }}/{{ trofeu.id }}" method="post">
                            {% if trofeu.id in obtidos %}
                                <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white p-2 px-4 rounded-lg text-xs font-bold transition">
                                    ✓ Obtido
                                </button>
                            {% else %}
                                <button type="submit" class="border border-purple-500/30 bg-[#080314]/50 text-purple-400 hover:text-white p-2 px-4 rounded-lg text-xs font-bold transition">
                                    Não Obtido
                                </button>
                            {% endif %}
                        </form>
                        </div>

                    </div>
                {% endfor %}
            </div>
        </div>

    </main>

</body>
</html>
