<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela do login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col justify-between">

    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800">Sistema Flask</h1>
        <div>
            <a href="/" class="text-sm font-semibold text-blue-600 hover:text-blue-700 transition">Criar uma conta</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-gray-100">
            
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Acessar Sistema</h2>
                <p class="text-sm text-gray-500 mt-1">Insira suas credenciais para fazer o login.</p>
            </div>

            <form action="/fazerLogin" method="post" class="space-y-4">
                <div>
                    <label for="cpf" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Digite o seu CPF</label>
                    <input type="text" id="cpf" name="cpf" required
                           class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm border p-2.5 bg-gray-50 text-gray-800 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition outline-none">
                </div>

                <div>
                    <label for="password" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Digite a sua senha</label>
                    <input type="password" id="password" name="password" required
                           class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm border p-2.5 bg-gray-50 text-gray-800 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition outline-none">
                </div>

                <div class="pt-2">
                    <button type="submit" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-bold transition shadow-sm hover:shadow">
                        Entrar no Sistema
                    </button>
                </div>
            </form>
            </form> <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-xs uppercase">
                    <span class="bg-white px-2 text-gray-400 font-medium">Novo por aqui?</span>
                </div>
            </div>

            <a href="/" 
               class="block w-full text-center bg-gray-50 hover:bg-gray-100 text-blue-600 border border-blue-200 p-3 rounded-lg font-semibold transition shadow-sm">
                Criar uma nova conta
            </a>

        </div>
    </main>

        </div>
    </main>

    <footer class="text-center py-4 text-xs text-gray-400">
        &copy; 2026 Meu Projeto Flask. Todos os direitos reservados.
    </footer>

</body>
</html>
